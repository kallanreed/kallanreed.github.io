<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="baton" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0e6d3"/>
      <stop offset="100%" stop-color="#c8b89a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Time signature arc -->
  <path d="M160 380 A140 140 0 0 1 352 380" fill="none" stroke="#e94560" stroke-width="6" opacity="0.25"/>
  <path d="M190 360 A110 110 0 0 1 322 360" fill="none" stroke="#e94560" stroke-width="4" opacity="0.15"/>
  <!-- Beat dots: 4/4 time -->
  <circle cx="160" cy="385" r="14" fill="#e94560"/>
  <circle cx="232" cy="400" r="11" fill="#4ecdc4" opacity="0.7"/>
  <circle cx="296" cy="400" r="11" fill="#4ecdc4" opacity="0.7"/>
  <circle cx="352" cy="385" r="11" fill="#4ecdc4" opacity="0.7"/>
  <!-- Conductor baton -->
  <line x1="310" y1="100" x2="190" y2="340" stroke="url(#baton)" stroke-width="7" stroke-linecap="round"/>
  <!-- Baton tip glow -->
  <circle cx="310" cy="100" r="12" fill="#ffd93d" opacity="0.6"/>
  <circle cx="310" cy="100" r="6" fill="#ffd93d"/>
  <!-- Baton grip -->
  <ellipse cx="190" cy="340" rx="16" ry="10" fill="#2a2a40" stroke="#444" stroke-width="2"/>
  <!-- Motion trail arcs -->
  <path d="M310 100 Q350 180 280 200" fill="none" stroke="#ffd93d" stroke-width="3" opacity="0.3" stroke-linecap="round"/>
  <path d="M310 100 Q260 160 300 220" fill="none" stroke="#ffd93d" stroke-width="2" opacity="0.2" stroke-linecap="round"/>
</svg>
